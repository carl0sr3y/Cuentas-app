<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cuentas</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #1a1d23;
    --surface: #22262f;
    --surface2: #2a2f3a;
    --border: #333845;
    --text: #e8eaf0;
    --text-muted: #8a90a0;
    --green: #3ecf8e;
    --green-dim: #1e4d37;
    --red: #f26b6b;
    --red-dim: #4d1e1e;
    --blue: #5b8df5;
    --blue-dim: #1e2f5a;
    --accent: #5b8df5;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 40px;
  }

  /* HEADER */
  .header {
    padding: 20px 16px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .back-btn {
    background: var(--surface);
    border: none;
    color: var(--text);
    width: 38px; height: 38px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .back-btn:active { opacity: .7; }
  .header-title { font-size: 20px; font-weight: 700; flex: 1; }

  /* DRIVE BUTTON + SYNC INDICATOR */
  .drive-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
    transition: all .15s;
  }
  .drive-btn.connected { color: var(--green); border-color: var(--green-dim); }
  .drive-btn:active { opacity: .7; }
  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
    transition: background .3s;
  }
  .sync-dot.syncing  { background: var(--blue); animation: pulse 1s infinite; }
  .sync-dot.synced   { background: var(--green); }
  .sync-dot.error    { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* BUTTONS */
  .main-actions { padding: 16px; display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 14px 10px;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: opacity .15s, transform .1s;
    letter-spacing: .01em;
  }
  .btn:active { transform: scale(.97); opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger  { background: var(--surface2); color: var(--red); border: 1.5px solid var(--red-dim); }
  .btn-green   { background: var(--green); color: #0a1f13; }
  .btn-red     { background: var(--red); color: #1f0a0a; }
  .btn-neutral { background: var(--surface2); color: var(--text); }
  .btn-full    { width: 100%; border-radius: var(--radius-sm); }

  /* ACCOUNT LIST */
  .section-label {
    padding: 4px 16px 8px;
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .account-item {
    margin: 0 16px 8px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: border-color .15s, background .15s;
  }
  .account-item:active { background: var(--surface2); }
  .account-item.selected { border-color: var(--red); background: var(--surface2); }
  .account-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .account-item.selected .account-check { background: var(--red); border-color: var(--red); color: #fff; }
  .account-item.favorite { border-color: #f5c542 !important; }
  .fav-btn {
    background: none; border: none;
    font-size: 20px; cursor: pointer;
    padding: 2px 4px; flex-shrink: 0;
    line-height: 1; opacity: .3;
    transition: opacity .15s, transform .15s;
  }
  .fav-btn.active { opacity: 1; }
  .fav-btn:active { transform: scale(1.3); }
  .account-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: var(--blue-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .account-info { flex: 1; min-width: 0; }
  .account-name { font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .account-sub  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .account-balance { font-weight: 700; font-size: 16px; }
  .positive { color: var(--green); }
  .negative { color: var(--red); }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 14px; line-height: 1.5; }

  /* DETAIL */
  .balance-hero { padding: 28px 16px 20px; text-align: center; }
  .balance-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: .05em; text-transform: uppercase; }
  .balance-amount { font-size: 52px; font-weight: 800; letter-spacing: -.02em; line-height: 1; }
  .balance-count  { font-size: 13px; color: var(--text-muted); margin-top: 8px; }
  .tx-actions { padding: 0 16px 16px; display: flex; gap: 10px; }
  .tx-actions .btn { padding: 13px 10px; font-size: 14px; }
  .tx-list { padding: 0 16px; }
  .tx-date-group { margin-bottom: 4px; }
  .tx-date-label { font-size: 12px; color: var(--text-muted); padding: 8px 0 6px; letter-spacing: .05em; }
  .tx-item {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 6px;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: background .15s;
  }
  .tx-item.income  { border-left-color: var(--green); }
  .tx-item.expense { border-left-color: var(--red); }
  .tx-item:active  { background: var(--surface2); }
  .tx-item.selected-tx { background: var(--surface2); outline: 1.5px solid var(--red); }
  .tx-dot {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .tx-dot.income  { background: var(--green-dim); }
  .tx-dot.expense { background: var(--red-dim); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-desc  { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-time  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .tx-amount { font-size: 16px; font-weight: 700; }

  /* DELETE BAR */
  .delete-bar {
    position: sticky; bottom: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; gap: 10px;
  }

  /* MODAL — aligned to top when keyboard opens */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.65);
    backdrop-filter: blur(3px);
    z-index: 100;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 60px;
    overflow-y: auto;
  }
  .modal {
    background: var(--surface);
    border-radius: 22px;
    padding: 24px 20px 28px;
    width: calc(100% - 32px);
    max-width: 440px;
    animation: slideDown .22s ease;
    margin-bottom: 20px;
  }
  @keyframes slideDown { from { transform: translateY(-30px); opacity: 0; } }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; text-align: center; }
  .modal-body  { font-size: 15px; color: var(--text-muted); text-align: center; line-height: 1.6; margin-bottom: 22px; }
  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 14px;
    font-size: 16px;
    margin-bottom: 12px;
    outline: none;
    font-family: inherit;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; }

  /* AMOUNT ROW with calculator button */
  .amount-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .amount-row input {
    flex: 1;
    margin-bottom: 0 !important;
  }
  .calc-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    width: 50px;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .15s;
  }
  .calc-btn:active { background: var(--border); }

  /* CALCULATOR POPUP */
  .calc-popup {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 12px;
  }
  .calc-display {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 22px;
    font-weight: 700;
    text-align: right;
    margin-bottom: 10px;
    min-height: 48px;
    color: var(--text);
    word-break: break-all;
    border: 1.5px solid var(--border);
  }
  .calc-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 7px;
  }
  .calc-key {
    background: var(--surface);
    border: none;
    color: var(--text);
    border-radius: 10px;
    padding: 14px 4px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: background .1s, transform .1s;
  }
  .calc-key:active { background: var(--border); transform: scale(.94); }
  .calc-key.op  { color: var(--blue); }
  .calc-key.eq  { background: var(--accent); color: #fff; }
  .calc-key.eq:active { background: #4070d0; }
  .calc-key.clr { color: var(--red); }
  .calc-key.span2 { grid-column: span 2; }

  /* DRIVE SCREEN */
  .drive-screen { padding: 32px 20px; text-align: center; }
  .drive-icon  { font-size: 56px; margin-bottom: 16px; }
  .drive-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
  .drive-sub   { font-size: 15px; color: var(--text-muted); line-height: 1.6; margin-bottom: 28px; }
  .drive-user  {
    background: var(--surface); border-radius: var(--radius);
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px; text-align: left;
  }
  .drive-avatar { width:40px;height:40px;border-radius:50%;background:var(--blue-dim);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0; }
  .drive-user-name  { font-weight: 600; font-size: 15px; }
  .drive-user-email { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .drive-actions { display: flex; flex-direction: column; gap: 10px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px;
    left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 20px;
    border-radius: 30px;
    font-size: 14px;
    z-index: 200;
    animation: fadeIn .2s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } }

  .hidden { display: none !important; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- SCREEN: HOME -->
<div id="screen-home">
  <div class="header">
    <div class="header-title">💼 Cuentas</div>
    <button class="drive-btn" id="drive-status-btn" onclick="openDriveScreen()">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="drive-status-text">Drive</span>
    </button>
  </div>
  <div class="main-actions">
    <button class="btn btn-primary" onclick="openModal('modal-new-account')">＋ Nueva cuenta</button>
    <button class="btn btn-danger" id="btn-delete-mode" onclick="toggleDeleteMode()">🗑 Eliminar</button>
  </div>
  <div class="section-label" id="accounts-label">Tus cuentas</div>
  <div id="account-list"></div>
  <div class="delete-bar hidden" id="delete-bar">
    <button class="btn btn-neutral btn-full" onclick="cancelDeleteMode()">Cancelar</button>
    <button class="btn btn-danger btn-full" onclick="confirmDeleteAccounts()">Eliminar seleccionadas</button>
  </div>
</div>

<!-- SCREEN: DETAIL -->
<div id="screen-detail" class="hidden">
  <div class="header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="header-title" id="detail-name">Cuenta</div>
  </div>
  <div class="balance-hero">
    <div class="balance-label">Balance total</div>
    <div class="balance-amount" id="detail-balance">Q 0.00</div>
    <div class="balance-count" id="detail-count">0 transacciones</div>
  </div>
  <div class="tx-actions">
    <button class="btn btn-green btn-full" onclick="openAddTx('income')">↑ Entrada</button>
    <button class="btn btn-red btn-full" onclick="openAddTx('expense')">↓ Salida</button>
  </div>
  <div class="tx-list" id="tx-list"></div>
  <div class="delete-bar hidden" id="delete-tx-bar">
    <button class="btn btn-neutral btn-full" onclick="cancelTxSelect()">Cancelar</button>
    <button class="btn btn-danger btn-full" onclick="confirmDeleteTx()">Eliminar transacción</button>
  </div>
</div>

<!-- SCREEN: DRIVE -->
<div id="screen-drive" class="hidden">
  <div class="header">
    <button class="back-btn" onclick="closeDriveScreen()">←</button>
    <div class="header-title">Google Drive</div>
  </div>
  <div class="drive-screen" id="drive-content"></div>
</div>

<!-- MODAL: Nueva cuenta -->
<div class="overlay hidden" id="modal-new-account" onclick="closeModalOutside(event,'modal-new-account')">
  <div class="modal">
    <div class="modal-title">Nueva cuenta</div>
    <input type="text" id="input-account-name" placeholder="Nombre de la cuenta (ej: Efectivo, Banco)" maxlength="40">
    <div class="modal-actions">
      <button class="btn btn-neutral btn-full" onclick="closeModal('modal-new-account')">Cancelar</button>
      <button class="btn btn-primary btn-full" onclick="createAccount()">Crear cuenta</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirmar eliminar cuentas -->
<div class="overlay hidden" id="modal-confirm-delete" onclick="closeModalOutside(event,'modal-confirm-delete')">
  <div class="modal">
    <div class="modal-title">⚠️ Eliminar cuentas</div>
    <div class="modal-body" id="confirm-delete-text"></div>
    <div class="modal-actions">
      <button class="btn btn-neutral btn-full" onclick="closeModal('modal-confirm-delete')">Cancelar</button>
      <button class="btn btn-danger btn-full" onclick="deleteSelectedAccounts()">Sí, eliminar</button>
    </div>
  </div>
</div>

<!-- MODAL: Agregar transacción -->
<div class="overlay hidden" id="modal-add-tx" onclick="closeModalOutside(event,'modal-add-tx')">
  <div class="modal">
    <div class="modal-title" id="modal-tx-title">Agregar entrada</div>
    <input type="text" id="input-tx-desc" placeholder="Descripción (ej: Pago cliente)" maxlength="60">
    <div class="amount-row">
      <input type="number" id="input-tx-amount" placeholder="Monto (ej: 250.00)" step="0.01" min="0.01">
      <button class="calc-btn" onclick="toggleCalc()" title="Calculadora">🧮</button>
    </div>
    <!-- CALCULADORA -->
    <div class="calc-popup hidden" id="calc-popup">
      <div class="calc-display" id="calc-display">0</div>
      <div class="calc-grid">
        <button class="calc-key clr span2" onclick="calcAction('C')">C</button>
        <button class="calc-key op" onclick="calcAction('⌫')">⌫</button>
        <button class="calc-key op" onclick="calcAction('/')">÷</button>
        <button class="calc-key" onclick="calcAction('7')">7</button>
        <button class="calc-key" onclick="calcAction('8')">8</button>
        <button class="calc-key" onclick="calcAction('9')">9</button>
        <button class="calc-key op" onclick="calcAction('*')">×</button>
        <button class="calc-key" onclick="calcAction('4')">4</button>
        <button class="calc-key" onclick="calcAction('5')">5</button>
        <button class="calc-key" onclick="calcAction('6')">6</button>
        <button class="calc-key op" onclick="calcAction('-')">−</button>
        <button class="calc-key" onclick="calcAction('1')">1</button>
        <button class="calc-key" onclick="calcAction('2')">2</button>
        <button class="calc-key" onclick="calcAction('3')">3</button>
        <button class="calc-key op" onclick="calcAction('+')">+</button>
        <button class="calc-key span2" onclick="calcAction('0')">0</button>
        <button class="calc-key" onclick="calcAction('.')">.</button>
        <button class="calc-key eq" onclick="calcAction('=')">＝</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-neutral btn-full" onclick="closeModal('modal-add-tx')">Cancelar</button>
      <button class="btn btn-primary btn-full" id="btn-save-tx" onclick="saveTx()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL: Confirmar eliminar transacción -->
<div class="overlay hidden" id="modal-confirm-tx-delete" onclick="closeModalOutside(event,'modal-confirm-tx-delete')">
  <div class="modal">
    <div class="modal-title">⚠️ Eliminar transacción</div>
    <div class="modal-body">¿Seguro que quieres eliminar esta transacción? El balance se actualizará automáticamente.</div>
    <div class="modal-actions">
      <button class="btn btn-neutral btn-full" onclick="closeModal('modal-confirm-tx-delete')">Cancelar</button>
      <button class="btn btn-danger btn-full" onclick="deleteSelectedTx()">Sí, eliminar</button>
    </div>
  </div>
</div>

<script>
// ══════════════ CONFIG ══════════════
const CLIENT_ID = '1062641709923-jn4radr921rvcgnqhq2rj74r45dqmhba.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILE = 'cuentas_data.json';
const LS_KEY = 'cuentas_data_v1';

// ══════════════ STATE ══════════════
let data = { accounts: [] };
let currentAccountId = null;
let deleteMode = false;
let selectedAccounts = new Set();
let currentTxType = 'income';
let selectedTxId = null;
let accessToken = null;
let driveFileId = null;
let userInfo = null;
let syncTimeout = null;
let calcExpr = '';
let calcHasResult = false;

// ══════════════ LOCAL STORAGE ══════════════
function loadLocal() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || { accounts: [] }; }
  catch { return { accounts: [] }; }
}
function saveLocal(d) { localStorage.setItem(LS_KEY, JSON.stringify(d)); }

// ══════════════ UTILS ══════════════
function fmt(n) {
  const abs = Math.abs(n).toFixed(2);
  const parts = abs.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return (n < 0 ? '-' : '') + 'Q ' + parts.join('.');
}
function nowISO() { return new Date().toISOString(); }
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('es-GT', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('es-GT', { hour:'2-digit', minute:'2-digit' });
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function toast(msg, dur=2400) {
  document.querySelectorAll('.toast').forEach(e => e.remove());
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), dur);
}

// ══════════════ SYNC DOT ══════════════
function setSyncDot(state) {
  // state: 'off' | 'syncing' | 'synced' | 'error'
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot';
  if (state !== 'off') dot.classList.add(state);
  if (state === 'synced') setTimeout(() => { dot.className = 'sync-dot synced'; }, 100);
}

// ══════════════ GOOGLE AUTH ══════════════
let tokenClient = null;
let tokenExpiresAt = 0;

function initGoogleAuth() {
  const saved = localStorage.getItem('cuentas_token');
  const savedUser = localStorage.getItem('cuentas_user');
  if (saved) {
    accessToken = saved;
    if (savedUser) userInfo = JSON.parse(savedUser);
    updateDriveBtn(true);
    loadFromDrive(true);
  }
  // Auto-refresh token every 45 minutes silently
  setInterval(silentTokenRefresh, 45 * 60 * 1000);
}

function getTokenClient(callback) {
  return google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES + ' https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile',
    prompt: '',
    callback
  });
}

function silentTokenRefresh() {
  if (!userInfo) return; // Not logged in
  const client = getTokenClient(async (resp) => {
    if (resp.error) return; // Silent fail — will retry next interval
    accessToken = resp.access_token;
    localStorage.setItem('cuentas_token', accessToken);
    tokenExpiresAt = Date.now() + 55 * 60 * 1000;
  });
  client.requestAccessToken({ prompt: '' });
}

async function ensureFreshToken() {
  // If token is about to expire or already expired, refresh it
  if (!userInfo) return false;
  if (Date.now() < tokenExpiresAt) return true; // Still valid
  return new Promise((resolve) => {
    const client = getTokenClient(async (resp) => {
      if (resp.error) { resolve(false); return; }
      accessToken = resp.access_token;
      localStorage.setItem('cuentas_token', accessToken);
      tokenExpiresAt = Date.now() + 55 * 60 * 1000;
      resolve(true);
    });
    client.requestAccessToken({ prompt: '' });
  });
}

function signInWithGoogle() {
  const client = getTokenClient(async (resp) => {
    if (resp.error) { toast('Error al conectar con Google'); return; }
    accessToken = resp.access_token;
    tokenExpiresAt = Date.now() + 55 * 60 * 1000;
    localStorage.setItem('cuentas_token', accessToken);
    try {
      const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
        headers: { Authorization: 'Bearer ' + accessToken }
      });
      userInfo = await r.json();
      localStorage.setItem('cuentas_user', JSON.stringify(userInfo));
    } catch(e) {}
    updateDriveBtn(true);
    toast('✓ Conectado con Google Drive');
    const fileId = await getDriveFileId(true);
    if (fileId) {
      await loadFromDrive(false);
    } else if (data.accounts && data.accounts.length > 0) {
      await saveToDrive();
      toast('✓ Datos subidos a Drive');
    } else {
      toast('Drive conectado — sin datos aún');
    }
    renderDriveScreen();
  });
  client.requestAccessToken();
}

function signOut() {
  accessToken = null; driveFileId = null; userInfo = null;
  // Limpiar TODO — token, usuario, fileId Y datos locales
  localStorage.removeItem('cuentas_token');
  localStorage.removeItem('cuentas_user');
  localStorage.removeItem('cuentas_file_id');
  localStorage.removeItem(LS_KEY);
  // Resetear datos en memoria
  data = { accounts: [] };
  updateDriveBtn(false);
  setSyncDot('off');
  renderHome();
  toast('Sesión cerrada');
  renderDriveScreen();
}

function updateDriveBtn(connected) {
  const btn = document.getElementById('drive-status-btn');
  btn.className = connected ? 'drive-btn connected' : 'drive-btn';
  setSyncDot(connected ? 'synced' : 'off');
}

// ══════════════ DRIVE API ══════════════
async function getDriveFileId(forceSearch=false) {
  if (!forceSearch && driveFileId) return driveFileId;
  // Always search on Drive — don't trust cached ID on new devices
  const r = await fetch(
    'https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27' + DRIVE_FILE + '%27&fields=files(id)',
    { headers: { Authorization: 'Bearer ' + accessToken } }
  );
  const d = await r.json();
  if (d.files && d.files.length > 0) {
    driveFileId = d.files[0].id;
    localStorage.setItem('cuentas_file_id', driveFileId);
    return driveFileId;
  }
  driveFileId = null;
  localStorage.removeItem('cuentas_file_id');
  return null;
}

async function saveToDrive() {
  if (!accessToken) return;
  setSyncDot('syncing');
  try {
    await ensureFreshToken();
    const fileId = await getDriveFileId(true);
    const content = JSON.stringify(data);
    const blob = new Blob([content], { type: 'application/json' });
    if (fileId) {
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files/' + fileId + '?uploadType=media', {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
        body: content
      });
      if (res.status === 401) {
        // Token expired — refresh and retry once
        const ok = await ensureFreshToken();
        if (!ok) throw new Error('auth');
        const retry = await fetch('https://www.googleapis.com/upload/drive/v3/files/' + fileId + '?uploadType=media', {
          method: 'PATCH',
          headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
          body: content
        });
        if (!retry.ok) throw new Error('retry failed');
      } else if (!res.ok) throw new Error('patch failed');
    } else {
      const meta = JSON.stringify({ name: DRIVE_FILE, parents: ['appDataFolder'] });
      const form = new FormData();
      form.append('metadata', new Blob([meta], { type: 'application/json' }));
      form.append('file', blob);
      const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + accessToken },
        body: form
      });
      if (!r.ok) throw new Error('create failed');
      const d = await r.json();
      driveFileId = d.id;
      localStorage.setItem('cuentas_file_id', driveFileId);
    }
    setSyncDot('synced');
  } catch(e) {
    setSyncDot('error');
    toast('✗ Error al guardar en Drive');
  }
}

async function loadFromDrive(silent=false) {
  if (!accessToken) return;
  setSyncDot('syncing');
  try {
    await ensureFreshToken();
    const fileId = await getDriveFileId(true);
    if (!fileId) {
      setSyncDot('synced');
      if (!silent) toast('No hay datos en Drive aún');
      return;
    }
    let r = await fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media', {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    if (r.status === 401) {
      const ok = await ensureFreshToken();
      if (!ok) throw new Error('auth');
      r = await fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media', {
        headers: { Authorization: 'Bearer ' + accessToken }
      });
    }
    if (!r.ok) throw new Error('fetch failed');
    const d = await r.json();
    if (d && d.accounts) {
      data = d;
      saveLocal(data);
      renderHome();
      setSyncDot('synced');
      if (!silent) toast('✓ Datos cargados desde Drive');
    } else {
      setSyncDot('synced');
    }
  } catch(e) {
    setSyncDot('error');
    if (!silent) toast('✗ Error al cargar desde Drive');
  }
}

function scheduleSave() {
  saveLocal(data);
  if (!accessToken) return;
  // Never overwrite Drive with empty data
  if (!data.accounts || data.accounts.length === 0) return;
  setSyncDot('syncing');
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => saveToDrive(), 1500);
}

// ══════════════ AUTO-SYNC ══════════════
let lastSyncedData = null;
async function autoSyncFromDrive() {
  if (!accessToken) return;
  try {
    const fileId = await getDriveFileId(true);
    if (!fileId) return;
    const r = await fetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media', {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    if (!r.ok) return;
    const d = await r.json();
    if (!d.accounts) return;
    const incoming = JSON.stringify(d);
    if (incoming === lastSyncedData) return;
    lastSyncedData = incoming;
    data = d;
    saveLocal(data);
    const homeVisible   = !document.getElementById('screen-home').classList.contains('hidden');
    const detailVisible = !document.getElementById('screen-detail').classList.contains('hidden');
    if (homeVisible)   renderHome();
    if (detailVisible) renderDetail();
    setSyncDot('synced');
  } catch(e) {}
}
setInterval(autoSyncFromDrive, 30000);

// ══════════════ HOME SCREEN ══════════════
function renderHome() {
  const list  = document.getElementById('account-list');
  const label = document.getElementById('accounts-label');
  list.innerHTML = '';
  if (!data.accounts.length) {
    label.textContent = '';
    list.innerHTML = `<div class="empty"><div class="empty-icon">💼</div><div class="empty-title">Sin cuentas aún</div><div class="empty-sub">Toca "Nueva cuenta" para empezar a llevar tu dinero.</div></div>`;
    return;
  }
  label.textContent = `Tus cuentas (${data.accounts.length})`;

  // Sort: favorites first, then alphabetically within each group
  const sorted = [...data.accounts].sort((a, b) => {
    if (!!a.favorite === !!b.favorite) return a.name.localeCompare(b.name, 'es');
    return a.favorite ? -1 : 1;
  });

  let shownFavLabel = false;
  let shownRestLabel = false;
  const hasFavs = sorted.some(a => a.favorite);

  sorted.forEach(acc => {
    const balance    = (acc.transactions||[]).reduce((s,t) => s+(t.type==='income'?t.amount:-t.amount), 0);
    const txCount    = (acc.transactions||[]).length;
    const isSelected = selectedAccounts.has(acc.id);
    const isFav      = !!acc.favorite;

    // Section labels
    if (hasFavs) {
      if (isFav && !shownFavLabel) {
        shownFavLabel = true;
        const lbl = document.createElement('div');
        lbl.className = 'section-label';
        lbl.textContent = '⭐ Favoritos';
        list.appendChild(lbl);
      }
      if (!isFav && !shownRestLabel) {
        shownRestLabel = true;
        const lbl = document.createElement('div');
        lbl.className = 'section-label';
        lbl.style.marginTop = '8px';
        lbl.textContent = 'Todas las cuentas';
        list.appendChild(lbl);
      }
    }

    const div = document.createElement('div');
    div.className = `account-item${isSelected?' selected':''}${isFav?' favorite':''}`;
    div.innerHTML = `
      <div class="account-check" style="display:${deleteMode?'flex':'none'}">${isSelected?'✓':''}</div>
      <div class="account-icon">💳</div>
      <div class="account-info">
        <div class="account-name">${acc.name}</div>
        <div class="account-sub">${txCount} transacción${txCount!==1?'es':''}</div>
      </div>
      <div class="account-balance ${balance>=0?'positive':'negative'}">${fmt(balance)}</div>
      <button class="fav-btn${isFav?' active':''}" title="${isFav?'Quitar favorito':'Marcar favorito'}">⭐</button>`;

    // Star button — toggle favorite without opening account
    div.querySelector('.fav-btn').onclick = (e) => {
      e.stopPropagation();
      const a = data.accounts.find(x => x.id === acc.id);
      if (a) { a.favorite = !a.favorite; scheduleSave(); renderHome(); }
    };

    div.onclick = () => deleteMode ? toggleAccountSelect(acc.id) : openAccount(acc.id);
    list.appendChild(div);
  });
}

function toggleDeleteMode() {
  deleteMode = !deleteMode;
  selectedAccounts.clear();
  document.getElementById('delete-bar').classList.toggle('hidden', !deleteMode);
  document.getElementById('btn-delete-mode').textContent = deleteMode ? '✕ Cancelar' : '🗑 Eliminar';
  renderHome();
}
function cancelDeleteMode() {
  deleteMode = false; selectedAccounts.clear();
  document.getElementById('delete-bar').classList.add('hidden');
  document.getElementById('btn-delete-mode').textContent = '🗑 Eliminar';
  renderHome();
}
function toggleAccountSelect(id) {
  selectedAccounts.has(id) ? selectedAccounts.delete(id) : selectedAccounts.add(id);
  renderHome();
}
function confirmDeleteAccounts() {
  if (!selectedAccounts.size) { toast('Selecciona al menos una cuenta'); return; }
  const n = selectedAccounts.size;
  document.getElementById('confirm-delete-text').textContent =
    `¿Seguro que quieres eliminar ${n} cuenta${n>1?'s':''}? Esta acción no se puede deshacer.`;
  openModal('modal-confirm-delete');
}
function deleteSelectedAccounts() {
  data.accounts = data.accounts.filter(a => !selectedAccounts.has(a.id));
  scheduleSave();
  closeModal('modal-confirm-delete');
  cancelDeleteMode();
  toast('Cuentas eliminadas');
}
function createAccount() {
  const name = document.getElementById('input-account-name').value.trim();
  if (!name) { toast('Escribe un nombre para la cuenta'); return; }
  // No duplicates
  const exists = data.accounts.some(a => a.name.toLowerCase() === name.toLowerCase());
  if (exists) { toast('Ya existe una cuenta con ese nombre'); return; }
  data.accounts.push({ id: uid(), name, transactions: [] });
  scheduleSave();
  closeModal('modal-new-account');
  document.getElementById('input-account-name').value = '';
  renderHome();
  toast('Cuenta creada ✓');
}

// ══════════════ DETAIL SCREEN ══════════════
function openAccount(id) {
  currentAccountId = id; selectedTxId = null;
  // Push state for browser back button
  history.pushState({ screen: 'detail', accountId: id }, '');
  document.getElementById('screen-home').classList.add('hidden');
  document.getElementById('screen-detail').classList.remove('hidden');
  document.getElementById('delete-tx-bar').classList.add('hidden');
  renderDetail();
}
function goBack() {
  document.getElementById('screen-detail').classList.add('hidden');
  document.getElementById('screen-home').classList.remove('hidden');
  renderHome();
}
function getAccount() { return data.accounts.find(a => a.id === currentAccountId); }

function renderDetail() {
  const acc = getAccount(); if (!acc) return;
  const txs     = acc.transactions || [];
  const balance = txs.reduce((s,t) => s+(t.type==='income'?t.amount:-t.amount), 0);
  document.getElementById('detail-name').textContent = acc.name;
  const balEl = document.getElementById('detail-balance');
  balEl.textContent = fmt(balance);
  balEl.className = 'balance-amount ' + (balance>=0?'positive':'negative');
  document.getElementById('detail-count').textContent = `${txs.length} transacción${txs.length!==1?'es':''}`;
  const list = document.getElementById('tx-list');
  if (!txs.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Sin movimientos</div><div class="empty-sub">Agrega una entrada o salida para comenzar.</div></div>`;
    return;
  }
  const groups = {};
  [...txs].sort((a,b) => new Date(b.date)-new Date(a.date)).forEach(t => {
    const d = fmtDate(t.date);
    if (!groups[d]) groups[d] = [];
    groups[d].push(t);
  });
  list.innerHTML = '';
  Object.entries(groups).forEach(([date, items]) => {
    const group = document.createElement('div');
    group.className = 'tx-date-group';
    group.innerHTML = `<div class="tx-date-label">${date}</div>`;
    items.forEach(t => {
      const isIncome = t.type === 'income';
      const el = document.createElement('div');
      el.className = `tx-item ${isIncome?'income':'expense'}${selectedTxId===t.id?' selected-tx':''}`;
      el.innerHTML = `
        <div class="tx-dot ${isIncome?'income':'expense'}">${isIncome?'↑':'↓'}</div>
        <div class="tx-info">
          <div class="tx-desc">${t.desc||(isIncome?'Entrada':'Salida')}</div>
          <div class="tx-time">${fmtTime(t.date)}</div>
        </div>
        <div class="tx-amount ${isIncome?'positive':'negative'}">${isIncome?'+':'-'}${fmt(t.amount)}</div>`;
      el.onclick = () => selectTx(t.id);
      group.appendChild(el);
    });
    list.appendChild(group);
  });
}

function selectTx(id) {
  selectedTxId = selectedTxId===id ? null : id;
  document.getElementById('delete-tx-bar').classList.toggle('hidden', !selectedTxId);
  renderDetail();
}
function cancelTxSelect() {
  selectedTxId = null;
  document.getElementById('delete-tx-bar').classList.add('hidden');
  renderDetail();
}
function confirmDeleteTx() { openModal('modal-confirm-tx-delete'); }
function deleteSelectedTx() {
  const acc = getAccount();
  acc.transactions = acc.transactions.filter(t => t.id !== selectedTxId);
  selectedTxId = null;
  scheduleSave();
  closeModal('modal-confirm-tx-delete');
  document.getElementById('delete-tx-bar').classList.add('hidden');
  renderDetail();
  toast('Transacción eliminada');
}

// ══════════════ ADD TX ══════════════
function openAddTx(type) {
  currentTxType = type;
  document.getElementById('modal-tx-title').textContent = type==='income' ? '↑ Agregar entrada' : '↓ Agregar salida';
  document.getElementById('btn-save-tx').className = `btn btn-full ${type==='income'?'btn-green':'btn-red'}`;
  document.getElementById('input-tx-desc').value = '';
  document.getElementById('input-tx-amount').value = '';
  // Reset calc
  calcExpr = ''; calcHasResult = false;
  document.getElementById('calc-display').textContent = '0';
  document.getElementById('calc-popup').classList.add('hidden');
  openModal('modal-add-tx');
  setTimeout(() => document.getElementById('input-tx-desc').focus(), 100);
}
function saveTx() {
  const desc   = document.getElementById('input-tx-desc').value.trim();
  const amount = parseFloat(document.getElementById('input-tx-amount').value);
  if (!amount || amount <= 0) { toast('Ingresa un monto válido'); return; }
  getAccount().transactions.push({ id: uid(), type: currentTxType, desc, amount, date: nowISO() });
  scheduleSave();
  closeModal('modal-add-tx');
  renderDetail();
  toast(currentTxType==='income' ? 'Entrada agregada ✓' : 'Salida registrada ✓');
}

// ══════════════ CALCULATOR ══════════════
function toggleCalc() {
  document.getElementById('calc-popup').classList.toggle('hidden');
}
function calcAction(key) {
  const display = document.getElementById('calc-display');
  const ops = ['+','-','*','/'];

  if (key === 'C') {
    calcExpr = ''; calcHasResult = false;
    display.textContent = '0'; return;
  }
  if (key === '⌫') {
    calcExpr = calcExpr.slice(0,-1);
    display.textContent = calcExpr || '0'; return;
  }
  if (key === '=') {
    try {
      const result = Function('"use strict"; return (' + calcExpr + ')')();
      const rounded = Math.round(result * 100) / 100;
      calcExpr = String(rounded);
      calcHasResult = true;
      display.textContent = rounded;
      // Put result in amount field
      document.getElementById('input-tx-amount').value = rounded > 0 ? rounded : '';
    } catch(e) {
      display.textContent = 'Error';
      calcExpr = '';
    }
    return;
  }
  // If last result and user types a number, start fresh
  if (calcHasResult && !ops.includes(key)) {
    calcExpr = ''; calcHasResult = false;
  }
  // Prevent double operators
  const lastChar = calcExpr.slice(-1);
  if (ops.includes(key) && ops.includes(lastChar)) {
    calcExpr = calcExpr.slice(0,-1);
  }
  calcExpr += key;
  display.textContent = calcExpr;
}

// ══════════════ MODALS ══════════════
function openModal(id)  { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function closeModalOutside(e, id) { if (e.target.id===id) closeModal(id); }

// Browser back button support
window.addEventListener('popstate', (e) => {
  const state = e.state;
  // Close any open modal first
  ['modal-new-account','modal-confirm-delete','modal-add-tx','modal-confirm-tx-delete'].forEach(id => {
    if (!document.getElementById(id).classList.contains('hidden')) {
      closeModal(id); return;
    }
  });
  // If on detail screen, go back to home
  if (!document.getElementById('screen-detail').classList.contains('hidden')) {
    goBack();
  }
  // If on drive screen, close it
  if (!document.getElementById('screen-drive').classList.contains('hidden')) {
    closeDriveScreen();
  }
});

document.addEventListener('keydown', e => {
  if (e.key==='Enter') {
    if (!document.getElementById('modal-new-account').classList.contains('hidden')) createAccount();
    else if (!document.getElementById('modal-add-tx').classList.contains('hidden')) saveTx();
  }
  if (e.key==='Escape') {
    ['modal-new-account','modal-confirm-delete','modal-add-tx','modal-confirm-tx-delete'].forEach(closeModal);
  }
});

// ══════════════ INIT ══════════════
data = loadLocal();
renderHome();
// Push initial home state
history.replaceState({ screen: 'home' }, '');
window.addEventListener('load', initGoogleAuth);
